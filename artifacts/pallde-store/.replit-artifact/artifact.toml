kind = "web"
previewPath = "/"
title = "Pallde Çocuk Mobilyaları"
version = "1.0.0"
id = "artifacts/pallde-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20793
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pallde-store run dev"

[services.env]
PORT = "20793"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pallde-store", "run", "build"]
publicDir = "artifacts/pallde-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
